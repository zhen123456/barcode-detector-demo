<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>退货收货 H5 Demo</title>
  <style>
    :root {
      color-scheme: light;
      font-family: Arial, "Microsoft YaHei", sans-serif;
      background: #0b1220;
      color: #172033;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: #0b1220;
    }

    body {
      overscroll-behavior-y: contain;
    }

    button,
    input {
      font: inherit;
    }

    button {
      width: 100%;
      min-height: 50px;
      border: 0;
      border-radius: 999px;
      padding: 0 18px;
      color: #172033;
      background: rgba(255, 255, 255, 0.94);
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.16);
    }

    .btn-content {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-content svg {
      width: 20px;
      height: 20px;
      stroke-width: 2.4;
      flex: 0 0 auto;
    }

    button.secondary {
      color: #fff;
      background: rgba(15, 23, 42, 0.54);
      border: 1px solid rgba(255, 255, 255, 0.38);
      backdrop-filter: blur(10px);
    }

    button.blue {
      color: #fff;
      background: #0f62c9;
    }

    button:disabled {
      opacity: 0.52;
      cursor: not-allowed;
    }

    input {
      width: 100%;
      min-height: 46px;
      border: 1px solid rgba(255, 255, 255, 0.38);
      border-radius: 999px;
      padding: 0 14px;
      color: #fff;
      background: rgba(15, 23, 42, 0.54);
      backdrop-filter: blur(10px);
      font-size: 15px;
      outline: none;
    }

    input::placeholder {
      color: rgba(255, 255, 255, 0.72);
    }

    .app {
      min-height: 100dvh;
      background: #0b1220;
    }

    .topbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 30;
      padding: calc(10px + env(safe-area-inset-top)) 14px 10px;
      color: #fff;
      pointer-events: none;
    }

    .topline {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
    }

    h1 {
      margin: 0;
      font-size: 17px;
      line-height: 1.2;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.42);
    }

    .support {
      max-width: 50%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      border-radius: 999px;
      padding: 5px 9px;
      color: #fff;
      background: rgba(15, 23, 42, 0.62);
      backdrop-filter: blur(10px);
      font-size: 12px;
    }

    .support.ok {
      color: #dcfce7;
    }

    .support.bad {
      color: #fecaca;
    }

    .progress {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 6px;
    }

    .progress span {
      height: 5px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.28);
    }

    .progress span.active,
    .progress span.done {
      background: #fff;
    }

    .screen {
      display: none;
      min-height: 100dvh;
      background: #f4f6f8;
    }

    .screen.active {
      display: block;
    }

    .camera-screen {
      position: relative;
      overflow: hidden;
      background: #0b1220;
      color: #fff;
    }

    .video-wrap {
      position: absolute;
      inset: 0;
      background: #0b1220;
    }

    video {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .video-dim {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        180deg,
        rgba(5, 10, 20, 0.72) 0%,
        rgba(5, 10, 20, 0.12) 34%,
        rgba(5, 10, 20, 0.10) 58%,
        rgba(5, 10, 20, 0.72) 100%
      );
      pointer-events: none;
    }

    .scan-frame {
      position: absolute;
      left: 10%;
      right: 10%;
      top: 30%;
      height: 26%;
      border: 2px solid rgba(255, 255, 255, 0.94);
      border-radius: 16px;
      box-shadow: 0 0 0 999px rgba(0, 0, 0, 0.14), 0 0 22px rgba(255, 255, 255, 0.24);
      pointer-events: none;
    }

    .capture-frame {
      position: absolute;
      left: 8%;
      right: 8%;
      top: 22%;
      height: 48%;
      pointer-events: none;
    }

    .capture-frame.outer {
      border: 2px dashed rgba(255, 255, 255, 0.92);
      border-radius: 22px;
      box-shadow: 0 0 28px rgba(255, 255, 255, 0.18);
    }

    .capture-frame.inner {
      left: 14%;
      right: 14%;
      top: 26%;
      height: 40%;
      border: 2px solid rgba(255, 255, 255, 0.94);
      border-radius: 50%;
      box-shadow: 0 0 28px rgba(255, 255, 255, 0.20);
    }

    .camera-copy {
      position: absolute;
      left: 14px;
      right: 14px;
      top: calc(76px + env(safe-area-inset-top));
      z-index: 5;
      padding: 14px;
      border-radius: 14px;
      color: #fff;
      background: rgba(15, 23, 42, 0.46);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.24);
    }

    .camera-title {
      margin: 0 0 6px;
      font-size: 24px;
      line-height: 1.18;
      letter-spacing: 0;
    }

    .camera-hint {
      margin: 0;
      color: rgba(255, 255, 255, 0.82);
      font-size: 14px;
      line-height: 1.48;
    }

    .manual {
      position: absolute;
      left: 14px;
      right: 14px;
      bottom: calc(78px + env(safe-area-inset-bottom));
      z-index: 8;
      display: grid;
      gap: 8px;
    }

    .photo-preview {
      position: absolute;
      right: 14px;
      bottom: calc(88px + env(safe-area-inset-bottom));
      z-index: 8;
      width: 96px;
      border: 1px solid rgba(255, 255, 255, 0.42);
      border-radius: 12px;
      overflow: hidden;
      background: rgba(15, 23, 42, 0.52);
      backdrop-filter: blur(10px);
    }

    .photo-preview img {
      display: block;
      width: 100%;
      aspect-ratio: 4 / 3;
      object-fit: cover;
    }

    .photo-preview span {
      display: block;
      padding: 5px 6px;
      color: #fff;
      font-size: 11px;
      text-align: center;
    }

    .toast {
      position: fixed;
      left: 14px;
      right: 14px;
      top: calc(58px + env(safe-area-inset-top));
      z-index: 60;
      transform: translateY(-12px);
      opacity: 0;
      border-radius: 999px;
      padding: 10px 12px;
      color: #172033;
      background: rgba(255, 255, 255, 0.94);
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.20);
      font-size: 14px;
      font-weight: 800;
      text-align: center;
      pointer-events: none;
      transition: opacity 180ms ease, transform 180ms ease;
    }

    .toast.show {
      transform: translateY(0);
      opacity: 1;
    }

    .content-screen {
      min-height: 100dvh;
      padding: calc(76px + env(safe-area-inset-top)) 14px calc(88px + env(safe-area-inset-bottom));
      background: #f4f6f8;
    }

    .content-title {
      margin: 4px 0 6px;
      color: #172033;
      font-size: 24px;
      line-height: 1.18;
    }

    .content-hint {
      margin: 0 0 14px;
      color: #5f6f85;
      font-size: 14px;
      line-height: 1.55;
    }

    .card,
    .item-card {
      border: 1px solid #dce4ef;
      border-radius: 10px;
      background: #fff;
      box-shadow: 0 10px 24px rgba(20, 38, 75, 0.06);
    }

    .meta {
      padding: 12px;
      border-bottom: 1px solid #edf1f6;
    }

    .meta:last-child {
      border-bottom: 0;
    }

    .meta span,
    .item-sku {
      display: block;
      margin-bottom: 4px;
      color: #64748b;
      font-size: 12px;
    }

    .meta strong {
      overflow-wrap: anywhere;
      font-size: 15px;
    }

    .item-list {
      display: grid;
      gap: 10px;
    }

    .item-card {
      padding: 12px;
    }

    .item-name {
      margin: 0 0 6px;
      color: #172033;
      font-size: 15px;
      font-weight: 700;
      line-height: 1.35;
    }

    .qty-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
      margin-top: 10px;
      color: #344054;
    }

    .qty-control {
      display: grid;
      grid-template-columns: 42px 54px 42px;
      align-items: center;
      border: 1px solid #ccd6e3;
      border-radius: 8px;
      overflow: hidden;
      background: #fff;
    }

    .qty-control button {
      min-height: 42px;
      border-radius: 0;
      padding: 0;
      color: #172033;
      background: #eef3f8;
      box-shadow: none;
      font-size: 20px;
    }

    .qty-control input {
      min-height: 42px;
      border: 0;
      border-radius: 0;
      padding: 0;
      color: #172033;
      background: #fff;
      text-align: center;
      font-weight: 700;
    }

    .evidence-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      margin-top: 12px;
    }

    .evidence-grid img {
      width: 100%;
      aspect-ratio: 4 / 3;
      object-fit: cover;
      border-radius: 10px;
      background: #e7edf5;
    }

    .success {
      display: grid;
      place-items: center;
      min-height: 42dvh;
      text-align: center;
    }

    .success-mark {
      display: grid;
      place-items: center;
      width: 76px;
      height: 76px;
      margin: 0 auto 16px;
      border-radius: 50%;
      color: #fff;
      background: #16a34a;
      font-size: 42px;
      font-weight: 700;
    }

    details {
      margin-top: 12px;
      color: #64748b;
      font-size: 13px;
    }

    .log {
      max-height: 118px;
      overflow: auto;
      white-space: pre-wrap;
      border: 1px solid #e1e7ef;
      border-radius: 8px;
      padding: 10px;
      background: #fff;
      color: #344054;
      font-family: Consolas, "Courier New", monospace;
      font-size: 12px;
    }

    .bottom-bar {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 40;
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
      padding: 10px 14px calc(10px + env(safe-area-inset-bottom));
      pointer-events: auto;
    }

    .bottom-bar.two {
      grid-template-columns: 0.85fr 1.15fr;
    }

    .bottom-bar.camera-controls {
      grid-template-columns: 52px 76px 52px;
      align-items: center;
      justify-content: center;
      padding-bottom: calc(16px + env(safe-area-inset-bottom));
    }

    .bottom-bar.camera-controls button {
      width: 52px;
      min-height: 52px;
      height: 52px;
      padding: 0;
      justify-self: center;
      border-radius: 50%;
      color: #fff;
      background: rgba(15, 23, 42, 0.52);
      border: 1px solid rgba(255, 255, 255, 0.38);
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.24);
      backdrop-filter: blur(10px);
    }

    .bottom-bar.camera-controls #primaryBtn {
      grid-column: 2;
      width: 68px;
      min-height: 68px;
      height: 68px;
      color: #172033;
      background: rgba(255, 255, 255, 0.96);
      border: 4px solid rgba(255, 255, 255, 0.34);
      box-shadow: 0 0 0 4px rgba(15, 23, 42, 0.42), 0 14px 32px rgba(0, 0, 0, 0.28);
    }

    .bottom-bar.camera-controls #secondaryBtn {
      grid-column: 1;
      grid-row: 1;
    }

    .bottom-bar.camera-controls.two {
      grid-template-columns: 52px 76px 52px;
    }

    .bottom-bar.camera-controls .btn-content span {
      position: absolute;
      width: 1px;
      height: 1px;
      overflow: hidden;
      clip: rect(0 0 0 0);
      white-space: nowrap;
    }

    .bottom-bar.camera-controls .btn-content svg {
      width: 26px;
      height: 26px;
    }

    .bottom-bar.camera-controls #primaryBtn .btn-content svg {
      width: 31px;
      height: 31px;
    }

    .content-mode .topbar {
      color: #172033;
      background: rgba(244, 246, 248, 0.96);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid #dfe6ef;
      pointer-events: none;
    }

    .content-mode h1 {
      text-shadow: none;
    }

    .content-mode .support {
      color: #46566f;
      background: #e7edf5;
    }

    .content-mode .support.ok {
      color: #166534;
      background: #dcfce7;
    }

    .content-mode .support.bad {
      color: #991b1b;
      background: #fee2e2;
    }

    .content-mode .progress span {
      background: #d9e1ec;
    }

    .content-mode .progress span.active,
    .content-mode .progress span.done {
      background: #0f62c9;
    }

    .content-mode .bottom-bar {
      display: grid;
      grid-template-columns: 0.85fr 1.15fr;
      background: rgba(255, 255, 255, 0.97);
      border-top: 1px solid #dfe6ef;
      box-shadow: 0 -12px 26px rgba(20, 38, 75, 0.08);
    }

    .content-mode .bottom-bar #primaryBtn,
    .content-mode .bottom-bar #secondaryBtn {
      width: 100%;
      min-height: 50px;
      height: auto;
      border-radius: 999px;
      padding: 0 18px;
      grid-column: auto;
      grid-row: auto;
    }

    .content-mode .bottom-bar .btn-content span {
      position: static;
      width: auto;
      height: auto;
      overflow: visible;
      clip: auto;
      white-space: normal;
    }

    .content-mode .bottom-bar .btn-content svg {
      width: 20px;
      height: 20px;
    }

    .content-mode .bottom-bar button:not(.secondary) {
      color: #fff;
      background: #0f62c9;
    }

    .content-mode .bottom-bar button.secondary {
      color: #1f2937;
      background: #e7edf5;
      border-color: transparent;
      box-shadow: none;
    }

    .hidden {
      display: none !important;
    }

    @media (min-width: 680px) {
      .app {
        width: 430px;
        min-height: 100dvh;
        margin: 0 auto;
        position: relative;
        overflow: hidden;
      }

      .topbar,
      .bottom-bar,
      .toast {
        left: 50%;
        width: 430px;
        transform: translateX(-50%);
      }

      .toast {
        right: auto;
        transform: translateX(-50%) translateY(-12px);
      }

      .toast.show {
        transform: translateX(-50%) translateY(0);
      }
    }
  </style>
</head>
<body>
  <div id="app" class="app">
    <header class="topbar">
      <div class="topline">
        <h1>退货收货</h1>
        <span id="supportStatus" class="support">检测扫码能力...</span>
      </div>
      <div class="progress" aria-label="流程进度">
        <span data-progress="scan" class="active"></span>
        <span data-progress="outer"></span>
        <span data-progress="inner"></span>
        <span data-progress="confirm"></span>
      </div>
    </header>
    <div id="toast" class="toast" role="status" aria-live="polite"></div>

    <main>
      <section id="screen-scan" class="screen camera-screen active">
        <div class="video-wrap">
          <video id="video" playsinline muted></video>
          <div class="video-dim"></div>
          <div id="scanFrame" class="scan-frame" aria-hidden="true"></div>
        </div>
        <div class="camera-copy">
          <h2 class="camera-title">扫描退货订单</h2>
          <p id="cameraTip" class="camera-hint">对准退货单、面单或包裹上的二维码/条码。</p>
        </div>
        <div class="manual">
          <input id="manualOrder" type="text" placeholder="手动输入测试单号：RMA-2026-001">
          <button id="manualBtn" class="secondary" type="button">模拟扫码</button>
        </div>
      </section>

      <section id="screen-outer" class="screen camera-screen">
        <div class="video-wrap">
          <video id="outerMirror" playsinline muted></video>
          <div class="video-dim"></div>
          <div class="capture-frame outer" aria-hidden="true"></div>
        </div>
        <div class="camera-copy">
          <h2 class="camera-title">拍包裹外观</h2>
          <p class="camera-hint">把外箱、面单和破损情况完整放入画面。</p>
        </div>
        <div id="outerPreviewCard" class="photo-preview hidden">
          <img id="outerPhoto" alt="包裹外观照片">
          <span>外观照片</span>
        </div>
      </section>

      <section id="screen-inner" class="screen camera-screen">
        <div class="video-wrap">
          <video id="innerMirror" playsinline muted></video>
          <div class="video-dim"></div>
          <div class="capture-frame inner" aria-hidden="true"></div>
        </div>
        <div class="camera-copy">
          <h2 class="camera-title">拍包裹内物品</h2>
          <p class="camera-hint">打开包裹后，把商品和配件一起拍清楚。</p>
        </div>
        <div id="innerPreviewCard" class="photo-preview hidden">
          <img id="innerPhoto" alt="包裹内物品照片">
          <span>内件照片</span>
        </div>
      </section>

      <section id="screen-confirm" class="screen content-screen">
        <h2 class="content-title">确认收货数量</h2>
        <p class="content-hint">核对退货订单和商品明细，确认实际收到的数量。</p>
        <div class="card">
          <div class="meta"><span>退货单号</span><strong id="orderNo">-</strong></div>
          <div class="meta"><span>原订单号</span><strong id="sourceOrderNo">-</strong></div>
          <div class="meta"><span>买家</span><strong id="buyerName">-</strong></div>
          <div class="meta"><span>物流单号</span><strong id="trackingNo">-</strong></div>
        </div>
        <div id="itemsList" class="item-list" style="margin-top:12px;"></div>
        <div class="evidence-grid">
          <img id="outerEvidence" alt="外箱照片凭证">
          <img id="innerEvidence" alt="内件照片凭证">
        </div>
      </section>

      <div id="log" class="log hidden"></div>
    </main>

    <footer id="bottomBar" class="bottom-bar">
      <button id="primaryBtn" type="button">开启摄像头扫码</button>
      <button id="secondaryBtn" class="secondary hidden" type="button">重新开始</button>
    </footer>
  </div>

  <canvas id="canvas" class="hidden"></canvas>

  <script>
    const demoOrders = {
      "RMA-2026-001": {
        returnNo: "RMA-2026-001",
        sourceOrderNo: "SO-10058291",
        buyerName: "Lena Meyer",
        trackingNo: "DHL-0039284751",
        items: [
          { name: "Wireless Barcode Scanner", sku: "SCAN-2D-BLK", expectedQty: 1 },
          { name: "USB-C Charging Cable", sku: "CAB-C-1M", expectedQty: 1 }
        ]
      },
      "RMA-2026-002": {
        returnNo: "RMA-2026-002",
        sourceOrderNo: "SO-10058344",
        buyerName: "Marta Rossi",
        trackingNo: "DPD-7783921045",
        items: [
          { name: "Thermal Label Printer", sku: "PRINT-4X6-EU", expectedQty: 1 }
        ]
      },
      "RET-10003": {
        returnNo: "RET-10003",
        sourceOrderNo: "SO-10058402",
        buyerName: "Tom Smith",
        trackingNo: "EVRI-5529100388",
        items: [
          { name: "Inventory Handheld Terminal", sku: "PDA-WIFI-64", expectedQty: 2 },
          { name: "Protective Case", sku: "CASE-PDA-RUG", expectedQty: 2 }
        ]
      }
    };

    const stepOrder = ["scan", "outer", "inner", "confirm"];
    const app = document.querySelector("#app");
    const video = document.querySelector("#video");
    const outerMirror = document.querySelector("#outerMirror");
    const innerMirror = document.querySelector("#innerMirror");
    const canvas = document.querySelector("#canvas");
    const supportStatus = document.querySelector("#supportStatus");
    const toast = document.querySelector("#toast");
    const cameraTip = document.querySelector("#cameraTip");
    const manualOrder = document.querySelector("#manualOrder");
    const manualBtn = document.querySelector("#manualBtn");
    const orderNo = document.querySelector("#orderNo");
    const sourceOrderNo = document.querySelector("#sourceOrderNo");
    const buyerName = document.querySelector("#buyerName");
    const trackingNo = document.querySelector("#trackingNo");
    const itemsList = document.querySelector("#itemsList");
    const outerPhoto = document.querySelector("#outerPhoto");
    const innerPhoto = document.querySelector("#innerPhoto");
    const outerEvidence = document.querySelector("#outerEvidence");
    const innerEvidence = document.querySelector("#innerEvidence");
    const outerPreviewCard = document.querySelector("#outerPreviewCard");
    const innerPreviewCard = document.querySelector("#innerPreviewCard");
    const logEl = document.querySelector("#log");
    const bottomBar = document.querySelector("#bottomBar");
    const primaryBtn = document.querySelector("#primaryBtn");
    const secondaryBtn = document.querySelector("#secondaryBtn");

    let detector = null;
    let stream = null;
    let rafId = 0;
    let scanning = false;
    let currentStep = "scan";
    let currentOrder = null;
    let outerPhotoData = "";
    let innerPhotoData = "";
    let toastTimer = 0;

    const preferredFormats = [
      "qr_code", "aztec", "code_128", "code_39", "code_93", "codabar",
      "data_matrix", "ean_13", "ean_8", "itf", "pdf417", "upc_a", "upc_e"
    ];

    function log(message) {
      const time = new Date().toLocaleTimeString();
      logEl.textContent = `[${time}] ${message}\n${logEl.textContent}`;
    }

    function setSupport(text, className) {
      supportStatus.textContent = text;
      supportStatus.className = `support ${className || ""}`.trim();
    }

    function iconSvg(name) {
      const icons = {
        scan: '<path d="M4 7V5a1 1 0 0 1 1-1h2"/><path d="M17 4h2a1 1 0 0 1 1 1v2"/><path d="M20 17v2a1 1 0 0 1-1 1h-2"/><path d="M7 20H5a1 1 0 0 1-1-1v-2"/><path d="M7 12h10"/>',
        camera: '<path d="M14.5 4 13 6H8.5L7 4H4a2 2 0 0 0-2 2v11a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3.5"/>',
        rotate: '<path d="M21 12a9 9 0 1 1-2.64-6.36"/><path d="M21 4v6h-6"/>',
        back: '<path d="m12 19-7-7 7-7"/><path d="M19 12H5"/>',
        check: '<path d="M20 6 9 17l-5-5"/>',
        next: '<path d="M5 12h14"/><path d="m13 6 6 6-6 6"/>',
        close: '<path d="M18 6 6 18"/><path d="m6 6 12 12"/>',
        alert: '<path d="M12 9v4"/><path d="M12 17h.01"/><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>'
      };
      return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">${icons[name] || icons.next}</svg>`;
    }

    function setButton(button, icon, label) {
      button.innerHTML = `<span class="btn-content">${iconSvg(icon)}<span>${label}</span></span>`;
      button.setAttribute("aria-label", label);
      button.title = label;
    }

    function showToast(message) {
      clearTimeout(toastTimer);
      toast.textContent = message;
      toast.classList.add("show");
      toastTimer = setTimeout(() => {
        toast.classList.remove("show");
      }, 2200);
    }

    function showScreen(step) {
      currentStep = step;
      document.querySelectorAll(".screen").forEach((screen) => {
        screen.classList.toggle("active", screen.id === `screen-${step}`);
      });

      const activeIndex = stepOrder.indexOf(step);
      document.querySelectorAll("[data-progress]").forEach((item, index) => {
        item.classList.toggle("active", index === activeIndex);
        item.classList.toggle("done", index < activeIndex);
      });

      app.classList.toggle("content-mode", step === "confirm");
      updateBottomBar();
      window.scrollTo({ top: 0, behavior: "instant" });
    }

    function updateBottomBar() {
      secondaryBtn.classList.add("hidden");
      bottomBar.classList.remove("two", "camera-controls");
      primaryBtn.disabled = false;

      if (currentStep === "scan") {
        bottomBar.classList.add("camera-controls");
        setButton(primaryBtn, scanning ? "alert" : "scan", scanning ? "正在扫描..." : "开启摄像头扫码");
        primaryBtn.disabled = scanning || !detector;
        if (!detector) setButton(primaryBtn, "alert", "当前浏览器不支持扫码");
        if (stream) showSecondary("关闭摄像头", stopCamera);
        return;
      }

      if (currentStep === "outer") {
        bottomBar.classList.add("camera-controls");
        setButton(primaryBtn, outerPhotoData ? "rotate" : "camera", outerPhotoData ? "重新拍外箱" : "拍包裹外观");
        showSecondary("重新开始", resetWorkflow);
        return;
      }

      if (currentStep === "inner") {
        bottomBar.classList.add("camera-controls");
        setButton(primaryBtn, innerPhotoData ? "rotate" : "camera", innerPhotoData ? "重新拍内件" : "拍包裹内物品");
        showSecondary("返回外箱", () => showScreen("outer"));
        return;
      }

      if (currentStep === "confirm") {
        setButton(primaryBtn, "check", "确认数量，完成退货");
        showSecondary("返回内件", () => showScreen("inner"));
        return;
      }

      setButton(primaryBtn, "check", "确认数量，完成退货");
      showSecondary("返回内件", () => showScreen("inner"));
    }

    function showSecondary(text, handler) {
      bottomBar.classList.add("two");
      const icon = text.includes("关闭") ? "close" : text.includes("返回") ? "back" : "rotate";
      setButton(secondaryBtn, icon, text);
      secondaryBtn.onclick = handler;
      secondaryBtn.classList.remove("hidden");
    }

    function normalizeOrderCode(value) {
      const text = String(value || "").trim().toUpperCase();
      const knownKey = Object.keys(demoOrders).find((key) => text.includes(key));
      return knownKey || text;
    }

    function cloneOrder(order) {
      return JSON.parse(JSON.stringify(order));
    }

    function buildFallbackOrder(rawCode) {
      const code = normalizeOrderCode(rawCode) || `RMA-${Date.now()}`;
      return {
        returnNo: code,
        sourceOrderNo: "待匹配",
        buyerName: "待核验",
        trackingNo: "待核验",
        items: [
          { name: "扫码后生成的待核验商品", sku: "UNKNOWN-SKU", expectedQty: 1 }
        ]
      };
    }

    function findOrder(rawCode) {
      const code = normalizeOrderCode(rawCode);
      return cloneOrder(demoOrders[code] || buildFallbackOrder(code));
    }

    function renderOrder() {
      if (!currentOrder) return;
      orderNo.textContent = currentOrder.returnNo;
      sourceOrderNo.textContent = currentOrder.sourceOrderNo;
      buyerName.textContent = currentOrder.buyerName;
      trackingNo.textContent = currentOrder.trackingNo;
      outerEvidence.src = outerPhotoData;
      innerEvidence.src = innerPhotoData;
      itemsList.innerHTML = currentOrder.items.map((item, index) => `
        <article class="item-card">
          <p class="item-name">${item.name}</p>
          <span class="item-sku">${item.sku}</span>
          <div class="qty-row">
            <span>应收 ${item.expectedQty}</span>
            <div class="qty-control">
              <button type="button" data-qty-minus="${index}">-</button>
              <input type="number" min="0" step="1" value="${item.receivedQty ?? item.expectedQty}" data-qty="${index}" aria-label="${item.sku} 实收数量">
              <button type="button" data-qty-plus="${index}">+</button>
            </div>
          </div>
        </article>
      `).join("");
    }

    async function checkSupport() {
      if (!("BarcodeDetector" in window)) {
        setSupport("不支持原生扫码", "bad");
        log("BarcodeDetector 不可用，可用手动输入测试流程");
        updateBottomBar();
        return;
      }

      try {
        const supportedFormats = await BarcodeDetector.getSupportedFormats();
        const usableFormats = preferredFormats.filter((format) => supportedFormats.includes(format));
        detector = new BarcodeDetector({
          formats: usableFormats.length ? usableFormats : supportedFormats
        });
        setSupport("扫码可用", "ok");
        log(`BarcodeDetector 已就绪：${supportedFormats.join(", ")}`);
      } catch (error) {
        setSupport("扫码初始化失败", "bad");
        log(error.message || String(error));
      }
      updateBottomBar();
    }

    async function ensureCamera() {
      if (stream) return true;

      try {
        stream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: { ideal: "environment" },
            width: { ideal: 1280 },
            height: { ideal: 1920 }
          },
          audio: false
        });
        video.srcObject = stream;
        outerMirror.srcObject = stream;
        innerMirror.srcObject = stream;
        await video.play();
        outerMirror.play().catch(() => {});
        innerMirror.play().catch(() => {});
        cameraTip.textContent = "对准退货单二维码/条码";
        log("摄像头已开启");
        return true;
      } catch (error) {
        log(`摄像头开启失败：${error.message || String(error)}`);
        alert("摄像头开启失败，请检查权限，并确认使用 HTTPS 或 localhost 访问。");
        return false;
      }
    }

    async function startScanner() {
      if (!detector) return;
      resetWorkflow({ keepCamera: false, silent: true });
      if (!(await ensureCamera())) return;
      scanning = true;
      showScreen("scan");
      updateBottomBar();
      log("开始扫描退货订单");
      scanLoop();
    }

    async function scanLoop() {
      if (!scanning) return;

      try {
        const barcodes = await detector.detect(video);
        if (barcodes.length > 0) {
          scanning = false;
          cancelAnimationFrame(rafId);
          handleOrderDetected(barcodes[0].rawValue);
          return;
        }
      } catch (error) {
        log(`扫码失败：${error.message || String(error)}`);
      }

      rafId = requestAnimationFrame(scanLoop);
    }

    async function handleOrderDetected(rawValue) {
      currentOrder = findOrder(rawValue);
      outerPhotoData = "";
      innerPhotoData = "";
      outerPreviewCard.classList.add("hidden");
      innerPreviewCard.classList.add("hidden");
      showToast(`已扫描：${currentOrder.returnNo}`);
      showScreen("outer");
      await ensureCamera();
      log(`识别到退货单 ${currentOrder.returnNo}`);
    }

    function capturePhoto(kind) {
      if (!stream || !video.videoWidth) {
        alert("摄像头尚未就绪。");
        return false;
      }

      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      const ctx = canvas.getContext("2d");
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
      const dataUrl = canvas.toDataURL("image/jpeg", 0.86);

      if (kind === "outer") {
        outerPhotoData = dataUrl;
        outerPhoto.src = dataUrl;
        outerPreviewCard.classList.remove("hidden");
        log("已拍摄包裹外观");
        return true;
      }

      innerPhotoData = dataUrl;
      innerPhoto.src = dataUrl;
      innerPreviewCard.classList.remove("hidden");
      log("已拍摄包裹内物品");
      return true;
    }

    function saveQuantities() {
      if (!currentOrder) return;
      document.querySelectorAll("[data-qty]").forEach((input) => {
        const index = Number(input.dataset.qty);
        currentOrder.items[index].receivedQty = Number(input.value || 0);
      });
      log(`已确认数量：${currentOrder.items.map((item) => `${item.sku}=${item.receivedQty}`).join(", ")}`);
    }

    function completeReturn() {
      if (!currentOrder || !outerPhotoData || !innerPhotoData) return;
      saveQuantities();
      const summary = currentOrder.items
        .map((item) => `${item.sku} 实收 ${item.receivedQty ?? item.expectedQty}/${item.expectedQty}`)
        .join("；");
      log(`退货完成：${currentOrder.returnNo}`);
      alert(`退货收货完成\n${currentOrder.returnNo}\n${summary}`);
      resetWorkflow({ keepCamera: true, silent: true });
      if (detector && stream) {
        scanning = true;
        updateBottomBar();
        log("继续扫描下一个退货订单");
        scanLoop();
      }
    }

    function resetWorkflow(options = {}) {
      const keepCamera = Boolean(options.keepCamera);
      scanning = false;
      cancelAnimationFrame(rafId);
      currentOrder = null;
      outerPhotoData = "";
      innerPhotoData = "";
      manualOrder.value = "";
      itemsList.innerHTML = "";
      outerPhoto.removeAttribute("src");
      innerPhoto.removeAttribute("src");
      outerEvidence.removeAttribute("src");
      innerEvidence.removeAttribute("src");
      outerPreviewCard.classList.add("hidden");
      innerPreviewCard.classList.add("hidden");
      showScreen("scan");
      if (!keepCamera) stopCamera();
      if (!options.silent) log("流程已重置");
    }

    function stopCamera() {
      scanning = false;
      cancelAnimationFrame(rafId);
      if (stream) {
        stream.getTracks().forEach((track) => track.stop());
        stream = null;
      }
      video.srcObject = null;
      outerMirror.srcObject = null;
      innerMirror.srcObject = null;
      cameraTip.textContent = "摄像头未开启";
      updateBottomBar();
      log("摄像头已关闭");
    }

    primaryBtn.addEventListener("click", async () => {
      if (currentStep === "scan") {
        await startScanner();
        return;
      }
      if (currentStep === "outer") {
        if (capturePhoto("outer")) showScreen("inner");
        return;
      }
      if (currentStep === "inner") {
        if (capturePhoto("inner")) {
          renderOrder();
          showScreen("confirm");
        }
        return;
      }
      if (currentStep === "confirm") {
        completeReturn();
        return;
      }
    });

    manualBtn.addEventListener("click", () => {
      const value = manualOrder.value.trim();
      if (!value) {
        alert("请输入测试单号。");
        return;
      }
      handleOrderDetected(value);
    });

    itemsList.addEventListener("click", (event) => {
      const minus = event.target.closest("[data-qty-minus]");
      const plus = event.target.closest("[data-qty-plus]");
      if (!minus && !plus) return;
      const index = Number((minus || plus).dataset.qtyMinus ?? (minus || plus).dataset.qtyPlus);
      const input = document.querySelector(`[data-qty="${index}"]`);
      const current = Number(input.value || 0);
      input.value = Math.max(0, current + (plus ? 1 : -1));
    });

    window.addEventListener("beforeunload", stopCamera);

    checkSupport();
    setButton(manualBtn, "scan", "模拟扫码");
    updateBottomBar();
  </script>
</body>
</html>

<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>退货确认收货扫码 Demo</title>
  <style>
    :root {
      color-scheme: light;
      font-family: Arial, "Microsoft YaHei", sans-serif;
      background: #f4f6f8;
      color: #172033;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: #f4f6f8;
    }

    button,
    input {
      font: inherit;
    }

    button {
      min-height: 42px;
      border: 0;
      border-radius: 6px;
      padding: 0 14px;
      color: #fff;
      background: #0f62c9;
      cursor: pointer;
    }

    button.secondary {
      color: #1f2937;
      background: #e6ebf2;
    }

    button.danger {
      color: #fff;
      background: #b42318;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.55;
    }

    input[type="text"],
    input[type="number"] {
      width: 100%;
      min-height: 40px;
      border: 1px solid #cfd8e3;
      border-radius: 6px;
      padding: 8px 10px;
      color: #172033;
      background: #fff;
    }

    .app {
      width: min(1180px, 100%);
      margin: 0 auto;
      padding: 20px;
      display: grid;
      gap: 16px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
    }

    h1 {
      margin: 0;
      font-size: 22px;
      line-height: 1.2;
    }

    .status {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      border-radius: 999px;
      padding: 0 10px;
      font-size: 13px;
      color: #42526a;
      background: #e8edf4;
      white-space: nowrap;
    }

    .status.ok {
      color: #166534;
      background: #dcfce7;
    }

    .status.bad {
      color: #991b1b;
      background: #fee2e2;
    }

    .workflow {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
    }

    .step {
      border: 1px solid #d7dee9;
      border-radius: 6px;
      padding: 10px;
      background: #fff;
      color: #64748b;
      font-size: 13px;
    }

    .step strong {
      display: block;
      margin-bottom: 3px;
      color: #172033;
      font-size: 14px;
    }

    .step.active {
      border-color: #0f62c9;
      box-shadow: inset 0 0 0 1px #0f62c9;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1.08fr) minmax(360px, 0.92fr);
      gap: 16px;
      align-items: start;
    }

    .camera,
    .panel {
      border: 1px solid #d7dee9;
      border-radius: 8px;
      background: #fff;
      box-shadow: 0 12px 28px rgba(20, 38, 75, 0.08);
      overflow: hidden;
    }

    .video-wrap {
      position: relative;
      aspect-ratio: 4 / 3;
      background: #101828;
    }

    video {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .scan-frame {
      position: absolute;
      inset: 18%;
      border: 2px solid #22c55e;
      border-radius: 8px;
      box-shadow: 0 0 0 999px rgba(0, 0, 0, 0.26);
      pointer-events: none;
    }

    .mode-label {
      position: absolute;
      left: 12px;
      top: 12px;
      border-radius: 999px;
      padding: 6px 10px;
      color: #fff;
      background: rgba(15, 23, 42, 0.78);
      font-size: 13px;
    }

    .camera-actions,
    .panel-body {
      padding: 16px;
    }

    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    .manual-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      margin-top: 12px;
    }

    h2 {
      margin: 0 0 12px;
      font-size: 17px;
    }

    .muted {
      margin: 0 0 12px;
      color: #5f6f85;
      line-height: 1.55;
    }

    .order-meta {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 14px;
    }

    .meta {
      border: 1px solid #e1e7ef;
      border-radius: 6px;
      padding: 10px;
      background: #f8fafc;
    }

    .meta span {
      display: block;
      margin-bottom: 3px;
      color: #64748b;
      font-size: 12px;
    }

    .meta strong {
      overflow-wrap: anywhere;
      font-size: 14px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin: 10px 0 14px;
      font-size: 14px;
    }

    th,
    td {
      border-bottom: 1px solid #e3e9f2;
      padding: 10px 6px;
      text-align: left;
      vertical-align: middle;
    }

    th {
      color: #64748b;
      font-size: 12px;
      font-weight: 600;
    }

    td.qty {
      width: 88px;
    }

    .photo-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin: 12px 0;
    }

    figure {
      margin: 0;
      border: 1px solid #dfe6ef;
      border-radius: 6px;
      overflow: hidden;
      background: #f8fafc;
    }

    figure img {
      display: block;
      width: 100%;
      aspect-ratio: 4 / 3;
      object-fit: cover;
    }

    figcaption {
      padding: 8px 10px;
      color: #5f6f85;
      font-size: 12px;
    }

    .log {
      min-height: 102px;
      max-height: 170px;
      overflow: auto;
      white-space: pre-wrap;
      border: 1px solid #e1e7ef;
      border-radius: 6px;
      padding: 10px;
      background: #f8fafc;
      color: #344054;
      font-family: Consolas, "Courier New", monospace;
      font-size: 12px;
    }

    .hidden {
      display: none !important;
    }

    @media (max-width: 900px) {
      .layout,
      .workflow {
        grid-template-columns: 1fr;
      }

      .topbar {
        align-items: flex-start;
        flex-direction: column;
      }
    }

    @media (max-width: 520px) {
      .app {
        padding: 12px;
      }

      .manual-row,
      .order-meta,
      .photo-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div>
        <h1>退货确认收货扫码 Demo</h1>
        <p class="muted">扫码识别退货订单，拍照留存包裹外观，核对商品数量，再拍包裹内物品并完成退货收货。</p>
      </div>
      <span id="supportStatus" class="status">正在检测扫码能力...</span>
    </header>

    <nav class="workflow" aria-label="退货收货流程">
      <div id="step-scan" class="step active"><strong>1. 扫订单</strong>识别退货单号</div>
      <div id="step-outer" class="step"><strong>2. 拍外箱</strong>留存包裹照片</div>
      <div id="step-confirm" class="step"><strong>3. 确认数量</strong>核对商品明细</div>
      <div id="step-inner" class="step"><strong>4. 拍内件</strong>完成并继续</div>
    </nav>

    <main class="layout">
      <section class="camera">
        <div class="video-wrap">
          <video id="video" playsinline muted></video>
          <div id="scanFrame" class="scan-frame" aria-hidden="true"></div>
          <div id="modeLabel" class="mode-label">扫码模式</div>
        </div>
        <div class="camera-actions">
          <div class="button-row">
            <button id="startBtn" type="button">开启摄像头扫码</button>
            <button id="captureBtn" type="button" disabled>拍照</button>
            <button id="stopBtn" class="secondary" type="button" disabled>关闭摄像头</button>
            <button id="resetBtn" class="secondary" type="button">重新开始</button>
          </div>
          <div class="manual-row">
            <input id="manualOrder" type="text" placeholder="手动输入测试单号，如 RMA-2026-001">
            <button id="manualBtn" class="secondary" type="button">模拟扫码</button>
          </div>
        </div>
      </section>

      <section class="panel">
        <div class="panel-body">
          <h2 id="panelTitle">等待扫描退货订单</h2>
          <p id="panelHint" class="muted">测试单号：RMA-2026-001、RMA-2026-002、RET-10003。也可以扫任意码，系统会生成一条待核验订单。</p>

          <div id="orderBlock" class="hidden">
            <div class="order-meta">
              <div class="meta"><span>退货单号</span><strong id="orderNo">-</strong></div>
              <div class="meta"><span>原订单号</span><strong id="sourceOrderNo">-</strong></div>
              <div class="meta"><span>买家</span><strong id="buyerName">-</strong></div>
              <div class="meta"><span>物流单号</span><strong id="trackingNo">-</strong></div>
            </div>
            <table>
              <thead>
                <tr>
                  <th>商品</th>
                  <th>SKU</th>
                  <th>应收</th>
                  <th>实收</th>
                </tr>
              </thead>
              <tbody id="itemsBody"></tbody>
            </table>
          </div>

          <div id="photoBlock" class="photo-grid hidden">
            <figure id="outerFigure" class="hidden">
              <img id="outerPhoto" alt="包裹外观照片">
              <figcaption>包裹外观</figcaption>
            </figure>
            <figure id="innerFigure" class="hidden">
              <img id="innerPhoto" alt="包裹内物品照片">
              <figcaption>包裹内物品</figcaption>
            </figure>
          </div>

          <div class="button-row">
            <button id="confirmQtyBtn" type="button" disabled>确认数量，拍内件</button>
            <button id="completeBtn" type="button" disabled>完成退货，继续下一个</button>
          </div>

          <h2 style="margin-top:18px;">操作日志</h2>
          <div id="log" class="log"></div>
        </div>
      </section>
    </main>
  </div>

  <canvas id="canvas" class="hidden"></canvas>

  <script>
    const demoOrders = {
      "RMA-2026-001": {
        returnNo: "RMA-2026-001",
        sourceOrderNo: "SO-10058291",
        buyerName: "Lena Meyer",
        trackingNo: "DHL-0039284751",
        items: [
          { name: "Wireless Barcode Scanner", sku: "SCAN-2D-BLK", expectedQty: 1 },
          { name: "USB-C Charging Cable", sku: "CAB-C-1M", expectedQty: 1 }
        ]
      },
      "RMA-2026-002": {
        returnNo: "RMA-2026-002",
        sourceOrderNo: "SO-10058344",
        buyerName: "Marta Rossi",
        trackingNo: "DPD-7783921045",
        items: [
          { name: "Thermal Label Printer", sku: "PRINT-4X6-EU", expectedQty: 1 }
        ]
      },
      "RET-10003": {
        returnNo: "RET-10003",
        sourceOrderNo: "SO-10058402",
        buyerName: "Tom Smith",
        trackingNo: "EVRI-5529100388",
        items: [
          { name: "Inventory Handheld Terminal", sku: "PDA-WIFI-64", expectedQty: 2 },
          { name: "Protective Case", sku: "CASE-PDA-RUG", expectedQty: 2 }
        ]
      }
    };

    const steps = ["scan", "outer", "confirm", "inner"];
    const video = document.querySelector("#video");
    const canvas = document.querySelector("#canvas");
    const supportStatus = document.querySelector("#supportStatus");
    const scanFrame = document.querySelector("#scanFrame");
    const modeLabel = document.querySelector("#modeLabel");
    const startBtn = document.querySelector("#startBtn");
    const captureBtn = document.querySelector("#captureBtn");
    const stopBtn = document.querySelector("#stopBtn");
    const resetBtn = document.querySelector("#resetBtn");
    const manualOrder = document.querySelector("#manualOrder");
    const manualBtn = document.querySelector("#manualBtn");
    const panelTitle = document.querySelector("#panelTitle");
    const panelHint = document.querySelector("#panelHint");
    const orderBlock = document.querySelector("#orderBlock");
    const orderNo = document.querySelector("#orderNo");
    const sourceOrderNo = document.querySelector("#sourceOrderNo");
    const buyerName = document.querySelector("#buyerName");
    const trackingNo = document.querySelector("#trackingNo");
    const itemsBody = document.querySelector("#itemsBody");
    const photoBlock = document.querySelector("#photoBlock");
    const outerFigure = document.querySelector("#outerFigure");
    const innerFigure = document.querySelector("#innerFigure");
    const outerPhoto = document.querySelector("#outerPhoto");
    const innerPhoto = document.querySelector("#innerPhoto");
    const confirmQtyBtn = document.querySelector("#confirmQtyBtn");
    const completeBtn = document.querySelector("#completeBtn");
    const logEl = document.querySelector("#log");

    let detector = null;
    let stream = null;
    let rafId = 0;
    let scanning = false;
    let currentStep = "scan";
    let currentOrder = null;
    let outerPhotoData = "";
    let innerPhotoData = "";

    const preferredFormats = [
      "qr_code",
      "aztec",
      "code_128",
      "code_39",
      "code_93",
      "codabar",
      "data_matrix",
      "ean_13",
      "ean_8",
      "itf",
      "pdf417",
      "upc_a",
      "upc_e"
    ];

    function log(message) {
      const time = new Date().toLocaleTimeString();
      logEl.textContent = `[${time}] ${message}\n${logEl.textContent}`;
    }

    function setSupport(text, className) {
      supportStatus.textContent = text;
      supportStatus.className = `status ${className || ""}`.trim();
    }

    function setStep(step) {
      currentStep = step;
      for (const item of steps) {
        document.querySelector(`#step-${item}`).classList.toggle("active", item === step);
      }

      const labels = {
        scan: "扫码模式",
        outer: "拍包裹外观",
        confirm: "确认商品数量",
        inner: "拍包裹内物品"
      };

      modeLabel.textContent = labels[step];
      scanFrame.classList.toggle("hidden", step !== "scan");
      captureBtn.disabled = !(step === "outer" || step === "inner") || !stream;
      confirmQtyBtn.disabled = step !== "confirm";
      completeBtn.disabled = step !== "inner" || !innerPhotoData;
    }

    function normalizeOrderCode(value) {
      const text = String(value || "").trim().toUpperCase();
      const knownKey = Object.keys(demoOrders).find((key) => text.includes(key));
      return knownKey || text;
    }

    function buildFallbackOrder(rawCode) {
      const code = normalizeOrderCode(rawCode) || `RMA-${Date.now()}`;
      return {
        returnNo: code,
        sourceOrderNo: "待匹配",
        buyerName: "待核验",
        trackingNo: "待核验",
        items: [
          { name: "扫码后生成的待核验商品", sku: "UNKNOWN-SKU", expectedQty: 1 }
        ]
      };
    }

    function findOrder(rawCode) {
      const code = normalizeOrderCode(rawCode);
      return structuredClone(demoOrders[code] || buildFallbackOrder(code));
    }

    function renderOrder() {
      if (!currentOrder) return;
      orderNo.textContent = currentOrder.returnNo;
      sourceOrderNo.textContent = currentOrder.sourceOrderNo;
      buyerName.textContent = currentOrder.buyerName;
      trackingNo.textContent = currentOrder.trackingNo;
      itemsBody.innerHTML = currentOrder.items.map((item, index) => `
        <tr>
          <td>${item.name}</td>
          <td>${item.sku}</td>
          <td>${item.expectedQty}</td>
          <td class="qty">
            <input class="qty-input" type="number" min="0" step="1" value="${item.receivedQty ?? item.expectedQty}" data-index="${index}" aria-label="${item.sku} 实收数量">
          </td>
        </tr>
      `).join("");
      orderBlock.classList.remove("hidden");
    }

    async function checkSupport() {
      if (!("BarcodeDetector" in window)) {
        setSupport("当前浏览器不支持原生扫码", "bad");
        startBtn.disabled = true;
        log("BarcodeDetector 不可用，可用手动输入测试单号继续体验流程");
        return;
      }

      try {
        const supportedFormats = await BarcodeDetector.getSupportedFormats();
        const usableFormats = preferredFormats.filter((format) => supportedFormats.includes(format));
        detector = new BarcodeDetector({
          formats: usableFormats.length ? usableFormats : supportedFormats
        });
        setSupport(`支持原生扫码：${supportedFormats.length} 种码制`, "ok");
        log(`BarcodeDetector 已就绪：${supportedFormats.join(", ")}`);
      } catch (error) {
        setSupport("扫码初始化失败", "bad");
        startBtn.disabled = true;
        log(error.message || String(error));
      }
    }

    async function ensureCamera() {
      if (stream) return true;

      try {
        stream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: { ideal: "environment" },
            width: { ideal: 1280 },
            height: { ideal: 720 }
          },
          audio: false
        });
        video.srcObject = stream;
        await video.play();
        stopBtn.disabled = false;
        captureBtn.disabled = !(currentStep === "outer" || currentStep === "inner");
        log("摄像头已开启");
        return true;
      } catch (error) {
        log(`摄像头开启失败：${error.message || String(error)}`);
        alert("摄像头开启失败，请检查浏览器权限，并确认使用 HTTPS 或 localhost 访问。");
        return false;
      }
    }

    async function startScanner() {
      if (!detector) {
        alert("当前浏览器不支持 BarcodeDetector，请用手动输入模拟流程，或换 Android Chrome / macOS Chrome 测试。");
        return;
      }

      resetWorkflow(false);
      if (!(await ensureCamera())) return;
      beginScanning("开始扫描退货订单");
    }

    function beginScanning(logMessage) {
      scanning = true;
      startBtn.disabled = true;
      setStep("scan");
      panelTitle.textContent = "正在扫描退货订单";
      panelHint.textContent = "请将退货单、面单或包裹上的二维码/条码放入绿色框内。";
      log(logMessage);
      scanLoop();
    }

    async function scanLoop() {
      if (!scanning) return;

      try {
        const barcodes = await detector.detect(video);
        if (barcodes.length > 0) {
          const rawValue = barcodes[0].rawValue;
          scanning = false;
          cancelAnimationFrame(rafId);
          handleOrderDetected(rawValue);
          return;
        }
      } catch (error) {
        log(`扫码失败：${error.message || String(error)}`);
      }

      rafId = requestAnimationFrame(scanLoop);
    }

    async function handleOrderDetected(rawValue) {
      currentOrder = findOrder(rawValue);
      outerPhotoData = "";
      innerPhotoData = "";
      renderOrder();
      photoBlock.classList.add("hidden");
      outerFigure.classList.add("hidden");
      innerFigure.classList.add("hidden");
      panelTitle.textContent = "已识别订单，请拍包裹外观";
      panelHint.textContent = `识别结果：${rawValue}。请把包裹完整放入画面后拍照。`;
      startBtn.disabled = false;
      setStep("outer");
      await ensureCamera();
      log(`识别到退货单 ${currentOrder.returnNo}`);
    }

    function capturePhoto() {
      if (!stream || !video.videoWidth) {
        alert("摄像头尚未就绪。");
        return;
      }

      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      const ctx = canvas.getContext("2d");
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
      const dataUrl = canvas.toDataURL("image/jpeg", 0.86);

      if (currentStep === "outer") {
        outerPhotoData = dataUrl;
        outerPhoto.src = dataUrl;
        photoBlock.classList.remove("hidden");
        outerFigure.classList.remove("hidden");
        panelTitle.textContent = "确认退货商品数量";
        panelHint.textContent = "核对实收数量，必要时调整数量，然后进入内件拍照。";
        setStep("confirm");
        log("已拍摄包裹外观");
        return;
      }

      if (currentStep === "inner") {
        innerPhotoData = dataUrl;
        innerPhoto.src = dataUrl;
        photoBlock.classList.remove("hidden");
        innerFigure.classList.remove("hidden");
        completeBtn.disabled = false;
        panelTitle.textContent = "内件照片已留存";
        panelHint.textContent = "确认照片和数量无误后，完成退货收货并继续下一个。";
        log("已拍摄包裹内物品");
      }
    }

    function confirmQuantities() {
      if (!currentOrder) return;

      const inputs = document.querySelectorAll(".qty-input");
      for (const input of inputs) {
        const index = Number(input.dataset.index);
        currentOrder.items[index].receivedQty = Number(input.value || 0);
      }

      panelTitle.textContent = "请拍包裹内物品";
      panelHint.textContent = "打开包裹后，将实物和随附配件放入画面，拍照留存。";
      setStep("inner");
      log(`已确认数量：${currentOrder.items.map((item) => `${item.sku}=${item.receivedQty}`).join(", ")}`);
    }

    function completeReturn() {
      if (!currentOrder || !innerPhotoData) return;

      const summary = currentOrder.items
        .map((item) => `${item.sku} 实收 ${item.receivedQty ?? item.expectedQty}/${item.expectedQty}`)
        .join("；");

      alert(`退货收货完成\n${currentOrder.returnNo}\n${summary}`);
      log(`退货完成：${currentOrder.returnNo}`);
      resetWorkflow(true);
      if (detector && stream) {
        beginScanning("继续扫描下一个退货订单");
      }
    }

    function resetWorkflow(keepCamera) {
      scanning = false;
      cancelAnimationFrame(rafId);
      currentOrder = null;
      outerPhotoData = "";
      innerPhotoData = "";
      manualOrder.value = "";
      panelTitle.textContent = "等待扫描退货订单";
      panelHint.textContent = "测试单号：RMA-2026-001、RMA-2026-002、RET-10003。也可以扫任意码，系统会生成一条待核验订单。";
      orderBlock.classList.add("hidden");
      photoBlock.classList.add("hidden");
      outerFigure.classList.add("hidden");
      innerFigure.classList.add("hidden");
      outerPhoto.removeAttribute("src");
      innerPhoto.removeAttribute("src");
      itemsBody.innerHTML = "";
      startBtn.disabled = !detector;
      confirmQtyBtn.disabled = true;
      completeBtn.disabled = true;
      setStep("scan");

      if (!keepCamera) {
        stopCamera();
      }
    }

    function stopCamera() {
      scanning = false;
      cancelAnimationFrame(rafId);
      if (stream) {
        stream.getTracks().forEach((track) => track.stop());
        stream = null;
      }
      video.srcObject = null;
      stopBtn.disabled = true;
      captureBtn.disabled = true;
      startBtn.disabled = !detector;
      log("摄像头已关闭");
    }

    startBtn.addEventListener("click", startScanner);
    captureBtn.addEventListener("click", capturePhoto);
    stopBtn.addEventListener("click", stopCamera);
    resetBtn.addEventListener("click", () => resetWorkflow(false));
    confirmQtyBtn.addEventListener("click", confirmQuantities);
    completeBtn.addEventListener("click", completeReturn);
    manualBtn.addEventListener("click", () => {
      const value = manualOrder.value.trim();
      if (!value) {
        alert("请输入测试单号。");
        return;
      }
      handleOrderDetected(value);
    });
    window.addEventListener("beforeunload", stopCamera);

    checkSupport();
  </script>
</body>
</html>
